<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/icon-apple.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fazenda Tucunduva — Cardápio</title>
    <meta name="theme-color" content="#36537D" />
    <script>
      (function () {
        try {
          var theme = localStorage.getItem('tucunduva:theme');
          if (theme === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
          var fontSize = localStorage.getItem('tucunduva:fontScale');
          if (fontSize === 'grande' || fontSize === 'maior') {
            document.documentElement.setAttribute('data-fontsize', fontSize);
          }
        } catch (e) {}
      })();
    </script>
    <meta
      name="description"
      content="Cardápio digital da Fazenda Tucunduva — da terra à mesa, todos os dias."
    />

    <!-- Open Graph: como o link aparece no WhatsApp, Instagram, etc. -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Fazenda Tucunduva — Cardápio" />
    <meta
      property="og:description"
      content="Cardápio digital da Fazenda Tucunduva — da terra à mesa, todos os dias."
    />
    <meta property="og:image" content="https://menu-tucunduva.vercel.app/og-image.jpg" />

    <meta name="twitter:card" content="summary_large_image" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Restaurant",
        "name": "Fazenda Tucunduva",
        "servesCuisine": "Brasileira",
        "telephone": "+5511980435834",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "Rod. Dom Gabriel Paulino Bueno Couto, km 92,5 - Pedregulho",
          "addressLocality": "Cabreúva",
          "addressRegion": "SP",
          "addressCountry": "BR"
        },
        "openingHoursSpecification": {
          "@type": "OpeningHoursSpecification",
          "dayOfWeek": ["Saturday", "Sunday"],
          "opens": "12:00",
          "closes": "17:00"
        },
        "sameAs": ["https://instagram.com/fazendatucunduva"],
        "hasMenu": "https://menu-tucunduva.vercel.app/"
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
